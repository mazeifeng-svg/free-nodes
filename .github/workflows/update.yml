name: Auto Scrape Nodes

# 触发条件
于:
  schedule:
    - cron: "0 * * * *"  # 每小时的 0 分触发一次 (UTC 时间)
  workflow_dispatch:      # 允许你在 GitHub 网页上点击按钮手动运行

permissions:
  contents: write         # 赋予 GitHub Actions 推送代码的权限

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper Script
      run: python scraper.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions Bot"
        git add output/
        # 如果文件没有变化则跳过 commit，防止报错停止
        git commit -m "🚀 Auto update nodes: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
        git push
